<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion - RIPSYDEVE</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
<div id="header-placeholder"></div>

<main class="container">
  <div class="login-box">
    <h1>Espace Membre</h1>
    <p>Identifiez-vous pour accéder aux ressources privées.</p>

    <form class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="votre@email.fr" required>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required>
      </div>
      <a href="espace_membre.html" class="btn-connexion">Se connecter</a>
    </form>
  </div>
</main>

<div id="footer-placeholder"></div>
<script src="../js/app.js"></script>
</body>
</html>
